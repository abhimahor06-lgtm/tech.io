<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poornima University — AI Assistant</title>
<style>
  /* simplified styles for brevity */
  body { font-family: Arial, sans-serif; background: #0d0f2b; color: #e8eaf6; margin: 0; }
  .chat-container { max-width: 680px; margin: 40px auto; background: rgba(17,19,64,0.9); border-radius: 18px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; }
  .chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
  .chat-header h1 { font-size: 18px; margin:0; }
  #messages { padding: 20px; height: 420px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
  .msg-row { display:flex; gap: 10px; }
  .msg-row.user { justify-content: flex-end; }
  .bubble { max-width: 78%; padding: 12px 14px; border-radius: 16px; line-height: 1.5; }
  .bubble.user { background: linear-gradient(135deg,#E8B84B,#FF8C42); color: #060714; }
  .bubble.bot { background: rgba(17,19,64,0.9); border: 1px solid rgba(0,201,177,0.3); }
  .input-row { display: flex; gap: 10px; padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  #chat-input { flex: 1; border: 1px solid rgba(255,255,255,0.18); border-radius: 14px; padding: 10px 14px; background: rgba(255,255,255,0.05); color: #e8eaf6; outline: none; }
  #send-btn { padding: 0 18px; border: none; border-radius: 14px; background: #00c9b1; color: #060714; font-weight: 700; cursor: pointer; }
  #send-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .typing { font-size: 13px; color: rgba(232,234,246,0.7); }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#00C9B1,#4DA3FF);display:flex;align-items:center;justify-content:center;font-size:22px;">🤖</div>
    <h1>Poornima AI Assistant</h1>
  </div>
  <div id="messages">
    <div class="bubble bot">Hi! Ask me anything about Poornima University — admissions, fees, campus, exams, or student services.</div>
  </div>
  <div class="input-row">
    <textarea id="chat-input" rows="1" placeholder="Type your question..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let isLoading = false;
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}
function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
  bubble.textContent = text;
  row.appendChild(bubble);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  autoResize(input);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text);
  addMessage('bot', 'Typing...');

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: [{ role: 'user', content: text }] })
    });

    const data = await response.json();
    const botText = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : 'Sorry, I could not get an answer.';

    // Remove the typing indicator and add the response
    const msgs = document.getElementById('messages');
    const last = msgs.lastElementChild;
    if (last && last.textContent === 'Typing...') last.remove();

    addMessage('bot', botText);
  } catch (err) {
    const msgs = document.getElementById('messages');
    const last = msgs.lastElementChild;
    if (last && last.textContent === 'Typing...') last.remove();
    addMessage('bot', 'Network error. Please ensure the server is running.');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
